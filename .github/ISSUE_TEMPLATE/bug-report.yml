name: Bug Report
description: Report a bug in a Reusable Workflow or Composite Action
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the following information.

  - type: input
    id: action-name
    attributes:
      label: Affected Action / Workflow
      description: Name of the Action or Workflow where the bug occurs
      placeholder: "e.g.: actions-lint.yml, pnpm-setup"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: The version you are using (tag or SHA)
      placeholder: "e.g.: v0.0.5"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Current Behavior
      description: Describe what is happening in detail
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe how it should work
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide the workflow configuration or steps to reproduce the issue
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste the error portion from the GitHub Actions run logs
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other relevant information
