# Documentation: .github/actions/docs/pnpm-setup.md
name: Setup pnpm
description: Setup Node.js and pnpm, and install dependencies

inputs:
  version:
    description: >-
      pnpm version to install. Leave empty to use the `packageManager` field in
      `package.json` (recommended). Required only when `package.json` has no
      `packageManager` field, since pnpm/action-setup v6 makes the version
      mandatory in that case.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      name: Install pnpm
      with:
        version: ${{ inputs.version }}
        package_json_file: package.json
        run_install: false

    - name: Install Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: .node-version

    - name: Get pnpm store directory
      id: pnpm-store
      shell: bash
      run: |
        echo "store-path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-store.outputs.store-path }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      shell: bash
      run: pnpm install
