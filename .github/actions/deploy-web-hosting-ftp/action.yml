# Documentation: .github/actions/docs/deploy-web-hosting-ftp.md
name: Deploy to Web Hosting via FTP
description: Deploy artifacts to web hosting server using lftp with dry-run and production mode support

inputs:
  output-dir:
    description: 'The build output directory name'
    required: true
  ftp-server:
    description: 'The address of the FTP server'
    required: true
  ftp-username:
    description: 'The username of the FTP server'
    required: true
  ftp-password:
    description: 'The password of the FTP server'
    required: true
  ftp-path:
    description: 'The path of the FTP server'
    required: true
  base-path:
    description: 'The base path of the artifact'
    required: false
  dry-run:
    description: 'Whether to run in dry-run mode (default: false)'
    required: false
    default: 'false'
  is-production:
    description: 'Whether this is a production deployment'
    required: false
    default: 'false'
  apply-htaccess:
    description: 'Whether to apply the artifact .htaccess on production deploys (opt-in; only effective when is-production is true)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install lftp for web hosting deployment
      shell: bash
      run: |
        which lftp || sudo apt update && sudo apt install -y lftp
    - name: Deploy to web hosting via FTP
      shell: bash
      env:
        FTP_SERVER: ${{ inputs.ftp-server }}
        FTP_USERNAME: ${{ inputs.ftp-username }}
        FTP_PASSWORD: ${{ inputs.ftp-password }}
        FTP_PATH: ${{ inputs.ftp-path }}
        BASE_PATH: ${{ inputs.base-path }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        DRY_RUN: ${{ inputs.dry-run }}
        DEBUG: ${{ runner.debug }}
        IS_PRODUCTION: ${{ inputs.is-production }}
        APPLY_HTACCESS: ${{ inputs.apply-htaccess }}
      run: |
        TARGET_PATH="${FTP_PATH}"
        SOURCE_PATH="./${OUTPUT_DIR}${BASE_PATH}"

        if [ "$DRY_RUN" = "true" ]; then
          echo "::notice::DRY RUN MODE: Checking deployment target"
          echo "::notice::Source: ${SOURCE_PATH}"
          echo "::notice::Target: ${TARGET_PATH}"
          echo "::notice::Server: ${FTP_SERVER}"

          # Check source directory
          if [ -d "$SOURCE_PATH" ]; then
            echo "::notice::Source directory found"
            echo "::notice::Files to deploy:"
            find "$SOURCE_PATH" -type f | sed -n '1,10{s|^|  - |;p}'
            TOTAL_FILES=$(find "$SOURCE_PATH" -type f | wc -l)
            if [ "$TOTAL_FILES" -gt 10 ]; then
              echo "  ... and more"
            fi
          else
            echo "::warning::Source directory not found: ${SOURCE_PATH}"
          fi

          # Check FTP connection
          echo "::notice::Testing FTP connection..."
          if lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e"\
          set ftp:ssl-allow no; \
          set net:timeout 30; \
          ls -la ${TARGET_PATH}; \
          exit"; then
            echo "::notice::FTP connection successful"
          else
            echo "::warning::FTP connection failed or target directory inaccessible"
          fi

          echo "::notice::Would deploy from: ${SOURCE_PATH}"
          echo "::notice::Would deploy to: ${TARGET_PATH}"
          echo "::notice::To actually deploy, set dry-run to 'false'"
        else
          echo "::notice::Deploying to FTP Server"
          echo "::notice::Source: ${SOURCE_PATH}"
          echo "::notice::Target: ${TARGET_PATH}"

          # Note: SSL disabled due to server configuration compatibility
          # Consider upgrading to FTPS if server supports it
          # Single-quote a value for safe embedding in lftp's -e command string
          # (lftp has its own shell-like parser): escape embedded ' as '\'' then
          # wrap in single quotes.
          lftp_quote() {
            local s=${1//\'/\'\\\'\'}
            printf "'%s'" "$s"
          }
          SRC_Q=$(lftp_quote "${SOURCE_PATH}")
          DST_Q=$(lftp_quote "${TARGET_PATH}")

          MIRROR_OPTS="--reverse --delete"
          PUT_HTACCESS_CMD=""
          if [ "$IS_PRODUCTION" = "true" ]; then
            # lftp mirror has no protect-only filter, so always exclude .htaccess
            # and _feature/ from the mirror to keep the server copies safe from
            # deletion. Each pattern needs its own -x. The '\\' in the bash string
            # becomes a single '\' passed to lftp's ERE, so '\.' matches a literal
            # dot (not "any char").
            MIRROR_OPTS="${MIRROR_OPTS} -x '\\.htaccess$' -x '_feature/'"
            if [ "$APPLY_HTACCESS" = "true" ] && [ -f "${SOURCE_PATH}/.htaccess" ]; then
              # Opt-in pass 2: upload the artifact's .htaccess explicitly so it is
              # transferred without re-enabling deletion of the server copy.
              HTACCESS_Q=$(lftp_quote "${SOURCE_PATH}/.htaccess")
              PUT_HTACCESS_CMD="put -O ${DST_Q} ${HTACCESS_Q};"
              echo "::notice::PRODUCTION MODE: Applying artifact .htaccess via explicit upload; mirror excludes .htaccess and _feature/ from deletion"
            else
              echo "::notice::PRODUCTION MODE: Excluding .htaccess and _feature/ directories from deletion"
            fi
          fi

          DEBUG_FLAG=""
          if [ "$DEBUG" = "1" ]; then
            DEBUG_FLAG=" -d"
          fi

          if lftp${DEBUG_FLAG} -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e"\
          set cmd:fail-exit yes; \
          set ftp:ssl-allow no; \
          set net:timeout 30; \
          mirror \
          ${MIRROR_OPTS} \
          ${SRC_Q} ${DST_Q}; \
          ${PUT_HTACCESS_CMD} \
          exit"; then
            echo "::notice::Deployment completed successfully"
          else
            echo "::error::FTP deployment failed"
            exit 1
          fi
        fi
