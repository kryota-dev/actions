# Documentation: .github/workflows/docs/delete-server.md
name: Delete Server Deployment

on:
  workflow_call:
    inputs:
      deploy-type:
        description: "Deploy method ('ftp' or 'rsync')"
        type: string
        required: true
      base-path:
        description: "Base path to delete"
        type: string
        required: true
      is-pr:
        description: "Whether this is a PR event"
        type: boolean
        required: true
      dry-run:
        description: "Dry-run mode"
        type: string
        required: false
        default: 'false'
    secrets:
      server-host:
        required: true
      server-user:
        required: true
      server-path:
        required: true
      server-password:
        required: false
      ssh-private-key:
        required: false

permissions: {}

jobs:
  delete:
    name: Delete
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      # --- FTP Delete ---
      - name: Delete via FTP
        if: ${{ inputs.deploy-type == 'ftp' }}
        uses: ./.github/actions/delete-ftp
        with:
          ftp-server: ${{ secrets.server-host }}
          ftp-username: ${{ secrets.server-user }}
          ftp-password: ${{ secrets.server-password }}
          target-path: ${{ secrets.server-path }}${{ inputs.base-path }}
          dry-run: ${{ inputs.dry-run }}

      # --- rsync Delete ---
      - name: Delete via rsync
        if: ${{ inputs.deploy-type == 'rsync' }}
        uses: ./.github/actions/delete-rsync
        with:
          ssh-host: ${{ secrets.server-host }}
          ssh-user: ${{ secrets.server-user }}
          ssh-private-key: ${{ secrets.ssh-private-key }}
          target-path: ${{ secrets.server-path }}${{ inputs.base-path }}
          dry-run: ${{ inputs.dry-run }}

      # --- PR Comments ---
      - name: Comment on PR (Success)
        if: ${{ success() && inputs.is-pr }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        env:
          DEPLOY_METHOD: ${{ inputs.deploy-type == 'ftp' && 'FTP' || inputs.deploy-type == 'rsync' && 'rsync' || 'Server' }}
        with:
          header: delete-pr-preview-success
          message: |
            ## ${{ inputs.dry-run == 'true' && '[DRY_RUN] ' || '' }}Deleted from ${{ env.DEPLOY_METHOD }} server (Preview)
            Preview removed from ${{ env.DEPLOY_METHOD }} server.

      - name: Comment on PR (Failure)
        if: ${{ failure() && inputs.is-pr }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: delete-pr-preview-failed
          hide_and_recreate: true
          message: |
            ## Delete failed

            > [!CAUTION]
            > Please check the build logs for details.
            > URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Hide failed comment
        if: ${{ success() && inputs.is-pr }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: delete-pr-preview-failed
          hide: true
          hide_classify: 'RESOLVED'

      - name: Hide deployed comment
        if: ${{ success() && inputs.is-pr }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: deploy-pr-preview-success
          hide: true
          hide_classify: 'RESOLVED'
