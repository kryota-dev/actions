# Documentation: .github/workflows/docs/deploy-web-hosting.md
name: Deploy to Web Hosting

on:
  workflow_call:
    inputs:
      deploy-type:
        description: "Deploy method ('ftp' or 'rsync')"
        type: string
        required: true
      artifact-name:
        description: "Name of the build artifact to download"
        type: string
        required: true
      output-dir:
        description: "Build output directory name"
        type: string
        required: true
      base-path-prefix:
        description: "Project-specific path prefix (e.g. '/<your-project>')"
        type: string
        required: false
        default: ''
      home-url:
        description: "Site home URL"
        type: string
        required: false
        default: ''
      dry-run:
        description: "Dry-run mode"
        type: string
        required: false
        default: 'false'
      production-branch:
        description: "Production branch name"
        type: string
        required: false
        default: 'main'
      ref-name:
        description: "Branch name override (auto-derived from github context when empty)"
        type: string
        required: false
        default: ''
    secrets:
      server-host:
        required: true
      server-user:
        required: true
      server-path:
        required: true
      server-password:
        required: false
      ssh-private-key:
        required: false
      slack-channel-id:
        required: false
      slack-bot-oauth-token:
        required: false
      slack-webhook-url:
        required: false
      slack-mention-user:
        required: false

permissions: {}

jobs:
  deploy:
    name: Deploy to Web Hosting
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      pull-requests: write

    steps:
      - name: Compute deploy path
        id: compute-path
        uses: kryota-dev/actions/.github/actions/compute-web-hosting-deploy-path@3b272b2a6373f12ef037d218f6202874c0dce80b # v0.2.0
        with:
          base-path-prefix: ${{ inputs.base-path-prefix }}
          production-branch: ${{ inputs.production-branch }}
          ref-name: ${{ inputs.ref-name }}

      - name: Check Slack configuration
        id: check-slack
        env:
          SLACK_CHANNEL_ID: ${{ secrets.slack-channel-id }}
          SLACK_BOT_OAUTH_TOKEN: ${{ secrets.slack-bot-oauth-token }}
          SLACK_WEBHOOK_URL: ${{ secrets.slack-webhook-url }}
        run: |
          if [ -n "$SLACK_CHANNEL_ID" ] && [ -n "$SLACK_BOT_OAUTH_TOKEN" ]; then
            echo "success-enabled=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "failure-enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact for web hosting deploy
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.output-dir }}/

      # --- FTP Deploy ---
      - name: Deploy to web hosting via FTP
        if: ${{ inputs.deploy-type == 'ftp' }}
        uses: kryota-dev/actions/.github/actions/deploy-web-hosting-ftp@3b272b2a6373f12ef037d218f6202874c0dce80b # v0.2.0
        with:
          base-path: ${{ steps.compute-path.outputs.deploy-path }}
          output-dir: ${{ inputs.output-dir }}
          ftp-server: ${{ secrets.server-host }}
          ftp-username: ${{ secrets.server-user }}
          ftp-password: ${{ secrets.server-password }}
          ftp-path: ${{ secrets.server-path }}${{ steps.compute-path.outputs.deploy-path }}
          dry-run: ${{ inputs.dry-run }}
          is-production: ${{ steps.compute-path.outputs.is-production }}

      # --- rsync Deploy ---
      - name: Deploy to web hosting via rsync
        if: ${{ inputs.deploy-type == 'rsync' }}
        uses: kryota-dev/actions/.github/actions/deploy-web-hosting-rsync@3b272b2a6373f12ef037d218f6202874c0dce80b # v0.2.0
        with:
          base-path: ${{ steps.compute-path.outputs.deploy-path }}
          output-dir: ${{ inputs.output-dir }}
          ssh-host: ${{ secrets.server-host }}
          ssh-user: ${{ secrets.server-user }}
          ssh-private-key: ${{ secrets.ssh-private-key }}
          ssh-path: ${{ secrets.server-path }}${{ steps.compute-path.outputs.deploy-path }}
          dry-run: ${{ inputs.dry-run }}
          is-production: ${{ steps.compute-path.outputs.is-production }}

      # --- PR Comments ---
      - name: Comment on PR (Deploy Success)
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        env:
          DEPLOY_URL: ${{ inputs.home-url }}${{ steps.compute-path.outputs.deploy-path }}/
          RESULT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          header: deploy-pr-preview-success
          message: |
            ## ${{ inputs.dry-run == 'true' && '🏜️ [Dry Run] ' || '✅ ' }}Deployed to Web Hosting (Preview)

            **URL**: ${{ inputs.dry-run == 'true' && env.RESULT_URL || env.DEPLOY_URL }}

            > [!NOTE]
            > This preview will be automatically removed after merging.

      - name: Comment on PR (Deploy Failure)
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: deploy-failed
          hide_and_recreate: true
          message: |
            ## ❌ Deploy to Web Hosting Failed

            > [!CAUTION]
            > Check the [build logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

      # --- Slack Notifications ---
      - name: Notify Slack (Deploy Success)
        if: ${{ success() && github.event_name != 'pull_request' && steps.check-slack.outputs.success-enabled == 'true' }}
        uses: kryota-dev/actions/.github/actions/slack-notify-success@3b272b2a6373f12ef037d218f6202874c0dce80b # v0.2.0
        with:
          channel-id: ${{ secrets.slack-channel-id }}
          bot-oauth-token: ${{ secrets.slack-bot-oauth-token }}
          title: 'Web Hosting deploy succeeded'
          message: '${{ inputs.home-url }}${{ steps.compute-path.outputs.deploy-path }}/'

      - name: Notify Slack (Deploy Failure)
        if: ${{ failure() && github.event_name != 'pull_request' && steps.check-slack.outputs.failure-enabled == 'true' }}
        uses: kryota-dev/actions/.github/actions/slack-notify-failure@3b272b2a6373f12ef037d218f6202874c0dce80b # v0.2.0
        with:
          webhook-url: ${{ secrets.slack-webhook-url }}
          mention-user: ${{ secrets.slack-mention-user }}
          title: 'Web Hosting deploy failed'

      # --- Hide Previous Failed Comments ---
      - name: Hide previous deploy failure comments
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: deploy-failed
          hide: true
          hide_classify: 'RESOLVED'
