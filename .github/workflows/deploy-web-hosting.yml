# Documentation: .github/workflows/docs/deploy-web-hosting.md
name: Deploy to Web Hosting

on:
  workflow_call:
    inputs:
      deploy-type:
        description: "Deploy method ('ftp' or 'rsync')"
        type: string
        required: true
      is-pr:
        description: "Whether this is a PR preview deploy"
        type: boolean
        required: true
      artifact-name:
        description: "Name of the build artifact to download"
        type: string
        required: true
      output-dir:
        description: "Build output directory name"
        type: string
        required: true
      base-path:
        description: "Base path for deployment (e.g. '/<project>/_feature/pr-123')"
        type: string
        required: false
        default: ''
      home-url:
        description: "Site home URL"
        type: string
        required: false
        default: ''
      dry-run:
        description: "Dry-run mode"
        type: string
        required: false
        default: 'false'
      is-production:
        description: "Whether this is a production deployment"
        type: string
        required: false
        default: 'false'
    secrets:
      server-host:
        required: true
      server-user:
        required: true
      server-path:
        required: true
      server-password:
        required: false
      ssh-private-key:
        required: false
      slack-channel-id:
        required: false
      slack-bot-oauth-token:
        required: false
      slack-webhook-url:
        required: false
      slack-mention-user:
        required: false

permissions: {}

jobs:
  deploy:
    name: Deploy to Web Hosting
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      pull-requests: write

    steps:
      - name: Check Slack configuration
        id: check-slack
        env:
          SLACK_CHANNEL_ID: ${{ secrets.slack-channel-id }}
          SLACK_BOT_OAUTH_TOKEN: ${{ secrets.slack-bot-oauth-token }}
          SLACK_WEBHOOK_URL: ${{ secrets.slack-webhook-url }}
        run: |
          if [ -n "$SLACK_CHANNEL_ID" ] && [ -n "$SLACK_BOT_OAUTH_TOKEN" ]; then
            echo "success-enabled=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "failure-enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact for web hosting deploy
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.output-dir }}/

      # --- FTP Deploy ---
      - name: Deploy to web hosting via FTP
        if: ${{ inputs.deploy-type == 'ftp' }}
        uses: ./.github/actions/deploy-web-hosting-ftp
        with:
          base-path: ${{ inputs.base-path }}
          output-dir: ${{ inputs.output-dir }}
          ftp-server: ${{ secrets.server-host }}
          ftp-username: ${{ secrets.server-user }}
          ftp-password: ${{ secrets.server-password }}
          ftp-path: ${{ secrets.server-path }}${{ inputs.base-path }}
          dry-run: ${{ inputs.dry-run }}
          is-production: ${{ inputs.is-production }}

      # --- rsync Deploy ---
      - name: Deploy to web hosting via rsync
        if: ${{ inputs.deploy-type == 'rsync' }}
        uses: ./.github/actions/deploy-web-hosting-rsync
        with:
          base-path: ${{ inputs.base-path }}
          output-dir: ${{ inputs.output-dir }}
          ssh-host: ${{ secrets.server-host }}
          ssh-user: ${{ secrets.server-user }}
          ssh-private-key: ${{ secrets.ssh-private-key }}
          ssh-path: ${{ secrets.server-path }}${{ inputs.base-path }}
          dry-run: ${{ inputs.dry-run }}
          is-production: ${{ inputs.is-production }}

      # --- PR Comments ---
      - name: Comment on PR (Deploy Success)
        if: ${{ success() && inputs.is-pr }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        env:
          DEPLOY_URL: ${{ inputs.home-url }}${{ inputs.base-path }}/
          RESULT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOY_METHOD: ${{ inputs.deploy-type == 'ftp' && 'FTP' || inputs.deploy-type == 'rsync' && 'rsync' || 'Server' }}
        with:
          header: deploy-pr-preview-success
          message: |
            ## ${{ inputs.dry-run == 'true' && '[DRY_RUN] ' || '' }}Deployed to Server via ${{ env.DEPLOY_METHOD }} (Preview)

            **Method**: ${{ env.DEPLOY_METHOD }}
            **URL**: ${{ inputs.dry-run == 'true' && env.RESULT_URL || env.DEPLOY_URL }}

            > [!NOTE]
            > Deployed content will be deleted after merging.

      - name: Comment on PR (Deploy Failure)
        if: ${{ failure() && inputs.is-pr }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: deploy-failed
          hide_and_recreate: true
          message: |
            ## Deploy failed

            > [!CAUTION]
            > Please check the build logs for details.
            > URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # --- Slack Notifications ---
      - name: Notify Slack (Deploy Success)
        if: ${{ success() && !inputs.is-pr && steps.check-slack.outputs.success-enabled == 'true' }}
        uses: ./.github/actions/slack-notify-success
        with:
          channel-id: ${{ secrets.slack-channel-id }}
          bot-oauth-token: ${{ secrets.slack-bot-oauth-token }}
          title: 'Deploy succeeded'
          message: 'URL: ${{ inputs.home-url }}${{ inputs.base-path }}'

      - name: Notify Slack (Deploy Failure)
        if: ${{ failure() && !inputs.is-pr && steps.check-slack.outputs.failure-enabled == 'true' }}
        uses: ./.github/actions/slack-notify-failure
        with:
          webhook-url: ${{ secrets.slack-webhook-url }}
          mention-user: ${{ secrets.slack-mention-user }}
          title: 'Deploy failed'

      # --- Hide Previous Failed Comments ---
      - name: Hide previous deploy failure comments
        if: ${{ success() && inputs.is-pr }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: deploy-failed
          hide: true
          hide_classify: 'RESOLVED'
