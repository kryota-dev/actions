# Documentation: .github/workflows/docs/undeploy-web-hosting.md
name: Undeploy from Web Hosting

on:
  workflow_call:
    inputs:
      deploy-type:
        description: "Deploy method ('ftp' or 'rsync')"
        type: string
        required: true
      base-path-prefix:
        description: "Project-specific path prefix (e.g. '/<your-project>')"
        type: string
        required: false
        default: ''
      production-branch:
        description: "Production branch name"
        type: string
        required: false
        default: 'main'
      ref-name:
        description: "Branch name override (auto-derived from github context when empty)"
        type: string
        required: false
        default: ''
      dry-run:
        description: "Dry-run mode"
        type: string
        required: false
        default: 'false'
    secrets:
      server-host:
        required: true
      server-user:
        required: true
      server-path:
        required: true
      server-password:
        required: false
      ssh-private-key:
        required: false

permissions: {}

jobs:
  delete:
    name: Undeploy from Web Hosting
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Compute deploy path
        id: compute-path
        uses: kryota-dev/actions/.github/actions/compute-web-hosting-deploy-path@0543a5553cf56bf46ff4a15ac9c8f25c9ecf02f2 # v0.1.0
        with:
          base-path-prefix: ${{ inputs.base-path-prefix }}
          production-branch: ${{ inputs.production-branch }}
          ref-name: ${{ inputs.ref-name }}

      # --- FTP Delete ---
      - name: Undeploy from web hosting via FTP
        if: ${{ inputs.deploy-type == 'ftp' }}
        uses: kryota-dev/actions/.github/actions/undeploy-web-hosting-ftp@0543a5553cf56bf46ff4a15ac9c8f25c9ecf02f2 # v0.1.0
        with:
          ftp-server: ${{ secrets.server-host }}
          ftp-username: ${{ secrets.server-user }}
          ftp-password: ${{ secrets.server-password }}
          target-path: ${{ secrets.server-path }}${{ steps.compute-path.outputs.deploy-path }}
          dry-run: ${{ inputs.dry-run }}

      # --- rsync Delete ---
      - name: Undeploy from web hosting via rsync
        if: ${{ inputs.deploy-type == 'rsync' }}
        uses: kryota-dev/actions/.github/actions/undeploy-web-hosting-rsync@0543a5553cf56bf46ff4a15ac9c8f25c9ecf02f2 # v0.1.0
        with:
          ssh-host: ${{ secrets.server-host }}
          ssh-user: ${{ secrets.server-user }}
          ssh-private-key: ${{ secrets.ssh-private-key }}
          target-path: ${{ secrets.server-path }}${{ steps.compute-path.outputs.deploy-path }}
          dry-run: ${{ inputs.dry-run }}

      # --- PR Comments ---
      - name: Comment on PR (Undeploy Success)
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: delete-pr-preview-success
          message: |
            ## ${{ inputs.dry-run == 'true' && '🏜️ [Dry Run] ' || '✅ ' }}Undeployed from Web Hosting (Preview)

            Preview environment has been cleaned up.

      - name: Comment on PR (Undeploy Failure)
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: delete-pr-preview-failed
          hide_and_recreate: true
          message: |
            ## ❌ Undeploy from Web Hosting Failed

            > [!CAUTION]
            > Check the [build logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

      - name: Hide previous undeploy failure comments
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: delete-pr-preview-failed
          hide: true
          hide_classify: 'RESOLVED'

      - name: Hide previous deploy success comments
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: deploy-pr-preview-success
          hide: true
          hide_classify: 'RESOLVED'
